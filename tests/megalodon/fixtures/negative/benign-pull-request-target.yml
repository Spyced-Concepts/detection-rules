# Negative fixture — legitimate pull_request_target without id-token: write
# Standard PR comment workflow — uses pull_request_target for fork PR access
# but does NOT grant id-token: write. Should NOT match Megalodon_Workflow_Dangerous_Permissions.
name: Comment on PR
on:
  pull_request_target:
    types: [opened]
permissions:
  pull-requests: write
  contents: read
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Thanks for your pull request!'
            })
