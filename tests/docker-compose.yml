#
# Single image — two services. Both use the detection-rules-tests image built from
# the one Dockerfile in this directory. No bind mounts — all file I/O is explicit;
# use run.py for the standard import/run/export workflow.
#
# Entrypoint + command are split so custom args can be passed via:
#   docker compose run <service> [args]
# The entrypoint (script path) is fixed; the command (args) can be overridden.
#
# Usage: see ../TESTING.md and tests/run.py

x-test-base: &test-base
  build:
    context: .
  image: detection-rules-tests

services:
  yara-tests:
    <<: *test-base
    entrypoint:
      - python3
      - /tests/yara-score.py
    command:
      - /input/test/yara/test-manifest.json
      - --root
      - /input
      - --output
      # run.py overrides this with a dated filename (yara-YYYY-MM-DD.txt).
      # This undated default is only used when invoking docker compose directly.
      - /output/yara-results.txt

  sigma-tests:
    <<: *test-base
    entrypoint:
      - python3
      - /tests/sigma-convert.py
    command:
      - --rules-dir
      - /input/sigma
      - --backends
      - splunk
      - lucene
      - opensearch_lucene
      - --output
      # run.py overrides this with a dated filename (sigma-YYYY-MM-DD.txt).
      # This undated default is only used when invoking docker compose directly.
      - /output/sigma-results.txt
